name: build

on:
  push:
    branches:
      - 'main'
      - '**'

permissions:
  contents: read

jobs:
  build:
    if: '!cancelled()'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
        with:
          install: 'true'
      - run: pnpm run build

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm run test

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm run lint

  sheriff:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm run sheriff

  fallow-badge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate health badge
        run: pnpm fallow health --format badge > badge.svg

      - name: Publish badge
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: badges
          keep_files: true
          include_files: badge.svg
