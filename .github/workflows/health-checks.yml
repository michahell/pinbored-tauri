name: health-checks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spartan-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
        with:
          install: 'true'
      - run: pnpm run spartan-health

  fallow-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
        with:
          install: 'true'
      - run: pnpm run fallow-health
