name: health-checks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spartan-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
        with:
          install: 'true'
      - run: pnpm run spartan-health

  fallow-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
        with:
          install: 'true'
      - run: pnpm run fallow-health

  fallow-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - name: update fallow health badge
        run: pnpm fallow health --format badge > badge.svg

      - name: Publish badge
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: badges
          keep_files: true
          include_files: badge.svg
