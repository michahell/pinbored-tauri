info:
  name: api_token
  type: http
  seq: 1

http:
  method: GET
  url: https://{{user}}:{{password}}@api.pinboard.in/v1/user/api_token/
  headers:
    - name: X-Auth-Token
      value: ""
      disabled: true
  auth: inherit

runtime:
  variables:
    - name: user
      value: "{{process.env.PINBOARD_V1_USERNAME}}"
    - name: password
      value: "{{process.env.PINBOARD_V1_PASSWORD}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
