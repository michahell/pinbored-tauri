<div class="p-5 pt-0">
  <div class="w-full flex flex-row justify-end-safe text-sm p-2 gap-1">
    <span> status flags report:&nbsp;&nbsp;</span>
    <hlm-badge variant="secondary">bookmarksFetching:&nbsp;{{ bookmarksFetching() }}</hlm-badge>
    <hlm-badge variant="secondary">staleChecking:&nbsp;{{ staleChecking() }}</hlm-badge>
    <hlm-badge variant="secondary">hasBookmarks:&nbsp;{{ hasBookmarks() }}</hlm-badge>
    <hlm-badge variant="secondary">staleCheckDisabled:&nbsp;{{ startStaleCheckDisabled() }}</hlm-badge>
  </div>
  <div class="w-full flex flex-row justify-end-safe text-sm p-2 gap-1">
    <span> queue flags report:&nbsp;&nbsp;</span>
    <hlm-badge variant="secondary">queueLength:&nbsp;{{ queueLength() }}</hlm-badge>
  </div>
  <!--  get bookmarks -->
  <div class="flex flex-row align-middle place-items-center place-content-center justify-center justify-items-center">
    <div hlmButtonGroup>
      <!-- fetch all -->
      <button hlmBtn variant="outline" size="sm" (click)="getBookmarks()" [attr.disabled]="bookmarksFetching()">
        fetch all
        @if (bookmarksFetching()) {
          <hlm-spinner data-icon="inline-start" />
        }
      </button>
      <!-- fetch most recent bookmarks -->
      <button hlmBtn variant="outline" size="sm" [disabled]="'disabled'">fetch most recent</button>
    </div>
    <p [class]="hlmMuted">stale checker</p>
    <div hlmButtonGroup>
      <!-- stale checker testing -->
      <button
        hlmBtn
        size="sm"
        variant="destructive"
        (click)="startStaleCheck()"
        [disabled]="startStaleCheckDisabled() ? 'disabled' : null"
      >
        start
        @if (staleChecking()) {
          <hlm-spinner data-icon="inline-start" />
        }
      </button>
      <button
        hlmBtn
        size="sm"
        variant="outline"
        (click)="toggleStaleCheck()"
        [disabled]="pauseStaleCheckDisabled() ? 'disabled' : null"
      >
        {{ staleChecking() ? 'pause' : 'resume' }}
      </button>
      <button
        hlmBtn
        size="sm"
        variant="outline"
        (click)="stopStaleCheck()"
        [disabled]="stopStaleCheckDisabled() ? 'disabled' : null"
      >
        stop
      </button>
    </div>
  </div>
  <!-- bookmarks table -->
  <app-bookmarks-table [bookmarks]="bookmarks()"></app-bookmarks-table>
</div>
