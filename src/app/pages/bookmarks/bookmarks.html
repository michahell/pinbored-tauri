<div class="p-5 pt-0">
  <div class="w-full flex flex-row justify-end-safe text-sm p-2 gap-1">
    <span> status flags report:&nbsp;&nbsp;</span>
    <hlm-badge variant="secondary">bookmarksFetching:&nbsp;{{ bookmarksFetching() }}</hlm-badge>
    <hlm-badge variant="secondary">staleChecking:&nbsp;{{ staleChecking() }}</hlm-badge>
    <hlm-badge variant="secondary">hasBookmarks:&nbsp;{{ hasBookmarks() }}</hlm-badge>
    <hlm-badge variant="secondary">staleCheckDisabled:&nbsp;{{ staleCheckDisabled() }}</hlm-badge>
  </div>
  <div class="w-full flex flex-row justify-end-safe text-sm p-2 gap-1">
    <span> queue flags report:&nbsp;&nbsp;</span>
    <hlm-badge variant="secondary">queueLength:&nbsp;{{ queueLength() }}</hlm-badge>
  </div>
  <!--  get bookmarks -->
  <div hlmButtonGroup>
    <div hlmButtonGroup>
      <!-- fetch all -->
      <button hlmBtn variant="outline" size="sm" (click)="getBookmarks()" [attr.disabled]="bookmarksFetching()">
        fetch all
        @if (bookmarksFetching()) {
          <hlm-spinner data-icon="inline-start" />
        }
      </button>
      <!-- fetch most recent bookmarks -->
      <button hlmBtn variant="outline" size="sm" disabled>fetch most recent</button>
      <!-- stale checker testing -->
      <button
        hlmBtn
        size="sm"
        variant="destructive"
        (click)="staleCheck()"
        [attr.disabled]="staleCheckDisabled() ? 'disabled' : null"
      >
        start stale checker
        @if (staleChecking()) {
          <hlm-spinner data-icon="inline-start" />
        }
      </button>
    </div>
  </div>
  <!-- bookmarks table -->
  <app-bookmarks-table [bookmarks]="bookmarks()"></app-bookmarks-table>
</div>
