<!-- pinboard API username and password -->
<div hlmFieldGroup class="flex flex-row mb-5">
  <div hlmField class="w-64 flex-auto">
    <label hlmFieldLabel for="username">username</label>
    <input hlmInput id="username" [(ngModel)]="username" />
  </div>
  <div hlmField class="w-64 flex-auto">
    <label hlmFieldLabel for="password">password</label>
    <input hlmInput id="password" [(ngModel)]="password" />
  </div>
</div>
