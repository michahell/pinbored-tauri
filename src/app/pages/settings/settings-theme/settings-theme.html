<section hlmCard>
  <div hlmCardHeader>
    <h3 hlmCardTitle>Theme</h3>
    <p hlmCardDescription>theme settings</p>
  </div>
  <hlm-card-footer>
    <div hlmButtonGroup>
      <button hlmBtn variant="outline" size="sm" (click)="setTheme('system')">use system preference</button>
      <button hlmBtn variant="outline" size="sm" (click)="setTheme('dark')">dark</button>
      <button hlmBtn variant="outline" size="sm" (click)="setTheme('light')">light</button>
    </div>
  </hlm-card-footer>
</section>
