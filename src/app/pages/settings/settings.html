<div class="p-5 pt-0">
  <h4 [class]="`${hlmH4} p-3`">settings</h4>
  <div class="flex flex-row justify-evenly gap-4">
    <section hlmCard class="w-1/2">
      <div hlmCardHeader>
        <h3 hlmCardTitle>Theme</h3>
        <p hlmCardDescription>theme settings</p>
      </div>
      <hlm-card-footer>
        <div hlmButtonGroup>
          <button hlmBtn variant="outline" size="sm" (click)="setTheme('system')">use system preference</button>
          <button hlmBtn variant="outline" size="sm" (click)="setTheme('dark')">dark</button>
          <button hlmBtn variant="outline" size="sm" (click)="setTheme('light')">light</button>
        </div>
      </hlm-card-footer>
    </section>

    <section hlmCard class="w-1/2">
      <div hlmCardHeader>
        <h3 hlmCardTitle>Another setting</h3>
        <p hlmCardDescription>this settings' settings</p>
        <div hlmCardAction></div>
      </div>
      <hlm-card-footer>
        <div hlmButtonGroup>
          <button hlmBtn variant="outline" size="sm">something</button>
          <button hlmBtn variant="outline" size="sm">else</button>
        </div>
      </hlm-card-footer>
    </section>
  </div>
</div>
