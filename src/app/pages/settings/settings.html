<app-main-layout>
  <div class="p-5 pt-0">
    <h4 [class]="`${hlmH4} p-3`">settings</h4>
    <div class="flex flex-row justify-between gap-4 mb-4">
      <!-- THEME -->
      <div class="w-1/2">
        <app-settings-theme></app-settings-theme>
      </div>
      <!-- SQLITE -->
      <div class="w-1/2">
        <app-settings-sqlite></app-settings-sqlite>
      </div>
    </div>
    <div class="flex flex-row justify-between gap-4 mb-4">
      <!-- CACHING / STORE -->
      <div class="w-1/2">
        <app-settings-caching></app-settings-caching>
      </div>
    </div>
  </div>
</app-main-layout>
