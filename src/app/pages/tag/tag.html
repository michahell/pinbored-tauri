<app-main-layout>
  <div class="py-5 px-5">
    <div class="flex flex-row justify-between">
      <app-big-tag [name]="tag()?.name ?? ''"></app-big-tag>
      <div class="flex flex-row content-center items-center">
        <p class="text-sm">bookmarks with this tag:&nbsp;</p>
        <hlm-badge variant="default">{{ tag()?.count }}</hlm-badge>
      </div>
    </div>
  </div>
  <!-- AI summary of tag, suggested rename of tag based on tag collection -->
  <div class="py-2 px-5 dark:bg-accent">[todo: AI summary of tag + suggested rename of tag]</div>
  <!-- bookmarks table -->
  <div class="p-5">
    <app-bookmarks-table [bookmarks]="bookmarks()"></app-bookmarks-table>
  </div>
</app-main-layout>
