<div class="flex flex-col w-full">
  <span class="w-full">
    {{ context.row.original.description }}
    @if (!isDesktop()) {
      <br />
    }
    - <small>{{ context.row.original.href }}</small>
  </span>
  <div class="w-full -ml-1 pt-1">
    @if (context.row.original.tags.length > 0) {
      @for (tag of context.row.original.tagsList; track $index) {
        <a
          hlmBadge
          variant="secondary"
          [class]="`${highlightTag() === tag ? yellowBadge() : skyBadge()} select-none cursor-pointer`"
          [routerLink]="`/tags/${tag}`"
          >{{ tag }}
        </a>
      }
    } @else {
      <hlm-badge variant="outline">no tags</hlm-badge>
    }
  </div>
</div>
